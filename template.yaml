AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Bee Health Monitoring Lambda

Globals:
  Function:
    Timeout: 120
    MemorySize: 2048

Resources:
  BeeHealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref AudioBucketName
      Events:
        BeeHealthAPI:
          Type: Api
          Properties:
            Path: /predict
            Method: post
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./
      DockerTag: python3.10-v1

Parameters:
  AudioBucketName:
    Type: String
    Description: Name of the S3 bucket containing audio files
    Default: bee-sense  # Replace with your actual bucket name

Outputs:
  BeeHealthApi:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/predict/"
  BeeHealthFunction:
    Description: "Lambda Function ARN"
    Value: !GetAtt BeeHealthFunction.Arn